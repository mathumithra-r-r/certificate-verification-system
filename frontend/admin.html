<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Upload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <h2>Admin - Upload Certificate</h2>
  <form id="uploadForm">
    <input type="file" id="certFile" name="certificate" required />
    <button type="submit">Upload</button>
  </form>
  <p id="adminResult"></p>
  <script defer>
    const form = document.getElementById('uploadForm');
  
  form.addEventListener('submit', async function (e) {
  e.preventDefault(); // Prevent default form submission
  
  const fileInput = document.getElementById('certFile');
  const formData = new FormData();
  formData.append('certificate', fileInput.files[0]);
  console.log("hii")
  try {
    const response = await fetch('http://localhost:5000/admin/upload', {
      method: 'POST',
      body: formData
    });
     console.log("hii")
    console.log(response.json())
    const data = await response.json();
   
    console.log("✅ Upload success:", data);
    document.getElementById('adminResult').innerHTML = `
      ✅ Uploaded!<br>Hash: ${data.hash}<br>IPFS CID: ${data.ipfs_cid}<br>
      <a href="https://gateway.pinata.cloud/ipfs/${data.ipfs_cid}" target="_blank">🔗 View Certificate</a>
    `;
  } catch (error) {
    console.error("❌ Upload failed:", error);
    document.getElementById('adminResult').innerText = '❌ Upload failed.';
  }
});

  </script>
</body>
</html>
